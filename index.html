<style>
:root{--gd:#1a5c34;--gm:#2d8653;--gl:#4caf78;--gmist:#e8f5ed;--td:#1a2e22;--tm:#4a6557;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;color:var(--td);background:#fff;overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Playfair Display',serif;}
html{scroll-behavior:smooth;}
.navbar-glass{background:rgba(255,255,255,0.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(45,134,83,0.12);box-shadow:0 2px 24px rgba(26,92,52,0.07);}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:500;color:white;backdrop-filter:blur(4px);}
.product-card{background:white;border-radius:20px;border:1.5px solid #e2ede7;transition:all 0.3s ease;overflow:hidden;box-shadow:0 4px 20px rgba(26,92,52,0.06);display:flex;flex-direction:column;height:100%;}
.product-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(26,92,52,0.15);border-color:var(--gl);}
.product-image{height:170px;overflow:hidden;border-radius:18px 18px 0 0;background:#f0f7f3;display:flex;align-items:center;justify-content:center;}
.product-content{padding:22px;display:flex;flex-direction:column;flex:1;}
.product-button{margin-top:auto;}
.benefit-card{background:white;border-radius:16px;border:1px solid #e2ede7;padding:28px;transition:all 0.3s ease;}
.benefit-card:hover{box-shadow:0 8px 32px rgba(26,92,52,0.1);transform:translateY(-3px);}
.offer-card{border-radius:20px;padding:28px;transition:all 0.3s ease;position:relative;overflow:hidden;}
.policy-card{border-radius:20px;overflow:hidden;border:1.5px solid #e2ede7;transition:all 0.3s ease;box-shadow:0 4px 20px rgba(26,92,52,0.06);}
.policy-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(26,92,52,0.14);}
.partner-logo{background:white;border-radius:14px;border:1.5px solid #e2ede7;padding:20px 24px;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all 0.3s ease;box-shadow:0 2px 12px rgba(26,92,52,0.05);}
.partner-logo:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(26,92,52,0.12);border-color:var(--gl);}
.proof-card{background:white;border-radius:16px;padding:28px;border:1px solid #e2ede7;box-shadow:0 4px 20px rgba(26,92,52,0.06);}
.modal-overlay{position:fixed;inset:0;background:rgba(15,61,34,0.65);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn 0.2s ease;}
.modal-box{background:white;border-radius:24px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(26,92,52,0.25);animation:slideUp 0.3s ease;}
.form-modal-box{background:white;border-radius:24px;max-width:440px;width:100%;box-shadow:0 32px 80px rgba(26,92,52,0.25);animation:slideUp 0.3s ease;overflow:hidden;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInL{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInR{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.btn-primary{background:linear-gradient(135deg,#2d8653,#1a5c34);color:white;border:none;border-radius:100px;padding:14px 28px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s ease;box-shadow:0 4px 16px rgba(26,92,52,0.3);display:inline-flex;align-items:center;gap:8px;text-decoration:none;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,92,52,0.4);}
.btn-outline-white{background:transparent;color:white;border:2px solid rgba(255,255,255,0.6);border-radius:100px;padding:13px 24px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:inline-flex;align-items:center;gap:8px;text-decoration:none;}
.btn-outline-white:hover{background:rgba(255,255,255,0.15);}
.btn-green-outline{background:transparent;color:var(--gm);border:2px solid var(--gm);border-radius:100px;padding:11px 22px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
.btn-green-outline:hover{background:var(--gm);color:white;}
.section-label{display:inline-block;background:var(--gmist);color:var(--gd);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:12px;}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,42px);font-weight:700;color:var(--td);line-height:1.2;}
.nav-link{font-size:13px;font-weight:500;color:var(--tm);text-decoration:none;transition:color 0.2s;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.nav-link:hover{color:var(--gd);}
.product-icon-bg{background:linear-gradient(135deg,#e8f5ed,#c8e8d5);border-radius:16px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.form-input{width:100%;border:1.5px solid #d0e4d8;border-radius:10px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border 0.2s;background:#fafcfb;}
.form-input:focus{border-color:var(--gm);}
.spec-tag{display:inline-block;background:var(--gmist);color:var(--gd);font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;margin:3px;}
.green-divider{width:48px;height:4px;background:linear-gradient(90deg,var(--gm),var(--gl));border-radius:2px;margin-bottom:20px;}
.modal-box::-webkit-scrollbar{width:5px;}
.modal-box::-webkit-scrollbar-thumb{background:#c0d8cb;border-radius:10px;}
.filter-tab{padding:9px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s ease;border:1.5px solid #d0e4d8;background:white;color:var(--tm);font-family:'DM Sans',sans-serif;white-space:nowrap;}
.filter-tab.active{background:linear-gradient(135deg,#2d8653,#1a5c34);color:white;border-color:transparent;box-shadow:0 4px 14px rgba(26,92,52,0.25);}
.filter-tab:hover:not(.active){border-color:var(--gm);color:var(--gm);}
/* Slider */
.slider-dot{height:10px;border-radius:5px;border:none;cursor:pointer;transition:all 0.35s ease;padding:0;}
.slider-arrow{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:white;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.slider-arrow:hover{background:rgba(255,255,255,0.28);}
.slide-text{animation:slideInL 0.55s ease forwards;}
.slide-visual{animation:slideInR 0.55s ease forwards;}
@media(max-width:900px){.nav-menu{display:none!important;}}
@media(max-width:700px){.slide-visual-wrap{display:none!important;}.hero-grid{grid-template-columns:1fr!important;}}
</style>

/* ── SLIDE VISUALS as simple React ── */
function SlideVisual({type}){
  const base={width:'100%',maxWidth:'340px',height:'260px',borderRadius:'20px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'12px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',padding:'24px'};

    <div style={base}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',width:'100%'}}>
        {[['🧻','Giấy vệ sinh JRT'],['🤲','Khăn lau tay'],['🍽️','Giấy ăn'],['✨','Giấy lụa']].map(([ic,lb])=>(

            <div style={{fontSize:'24px',marginBottom:'6px'}}>{ic}</div>

        ))}

      <div style={{background:'rgba(76,175,120,0.25)',borderRadius:'100px',padding:'8px 20px',border:'1px solid rgba(76,175,120,0.4)'}}>
        <span style={{color:'white',fontSize:'12px',fontWeight:'700'}}>📦 + Tissue Dispenser</span>
      </div>
    </div>
  );
  if(type==='process') return(
    <div style={base}>
      <div style={{fontSize:'13px',color:'rgba(255,255,255,0.6)',fontWeight:'600',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'4px'}}>Quy trình sản xuất</div>
      {[['🌿','Virgin Pulp'],['⚗️','Xử lý & Tẩy trắng'],['🖨️','Cán & Định hình'],['📦','Đóng gói vô trùng']].map(([ic,lb],i,arr)=>(
        <div key={lb} style={{width:'100%'}}>
          <div style={{background:'rgba(255,255,255,0.1)',borderRadius:'10px',padding:'10px 16px',display:'flex',alignItems:'center',gap:'10px',border:'1px solid rgba(255,255,255,0.12)'}}>
            <span style={{fontSize:'18px'}}>{ic}</span>
            <span style={{fontSize:'13px',color:'white',fontWeight:'500'}}>{lb}</span>
            <span style={{marginLeft:'auto',background:'rgba(76,175,120,0.35)',color:'rgba(255,255,255,0.9)',fontSize:'10px',fontWeight:'700',padding:'2px 8px',borderRadius:'100px'}}>✓</span>
          </div>
          {i<arr.length-1&&<div style={{width:'2px',height:'8px',background:'rgba(255,255,255,0.2)',margin:'0 auto'}}/>}

      ))}

  if(type==='material') return(
    <div style={base}>
      <div style={{fontSize:'52px'}}>🌿</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:'20px',fontWeight:'700',color:'white',textAlign:'center'}}>100% Virgin Pulp</div>

      <div style={{display:'flex',flexWrap:'wrap',gap:'6px',justifyContent:'center',marginTop:'4px'}}>

          <span key={t} style={{background:'rgba(76,175,120,0.25)',color:'white',fontSize:'11px',fontWeight:'600',padding:'4px 10px',borderRadius:'100px',border:'1px solid rgba(76,175,120,0.4)'}}>{t}</span>

/* ── HERO SLIDER ── */
function HeroSlider({openForm}){
  const [cur,setCur]=useState(0);
  const [key,setKey]=useState(0);
  const total=SLIDES.length;

  useEffect(()=>{
    const t=setInterval(()=>{setCur(c=>(c+1)%total);setKey(k=>k+1);},5500);
    return()=>clearInterval(t);
  },[]);

  const goTo=(i)=>{setCur(i);setKey(k=>k+1);};
  const s=SLIDES[cur];

  return(
    <section style={{background:s.bg,transition:'background 0.7s ease',position:'relative',overflow:'hidden',minHeight:'560px',display:'flex',alignItems:'center'}}>
      <div style={{position:'absolute',width:'480px',height:'480px',borderRadius:'50%',background:'rgba(76,175,120,0.07)',top:'-140px',right:'-100px',pointerEvents:'none'}}/>
      <div style={{position:'absolute',width:'320px',height:'320px',borderRadius:'50%',background:'rgba(26,92,52,0.14)',bottom:'-80px',left:'-60px',pointerEvents:'none'}}/>
      <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px)',backgroundSize:'30px 30px',pointerEvents:'none'}}/>

      <div style={{maxWidth:'1200px',margin:'0 auto',padding:'64px 28px',position:'relative',zIndex:1,width:'100%'}}>
        <div className="hero-grid" style={{display:'grid',gridTemplateColumns:'1fr 380px',gap:'48px',alignItems:'center'}}>
          {/* Text */}
          <div key={'t'+key} className="slide-text">
            <div style={{display:'inline-flex',alignItems:'center',gap:'8px',background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'100px',padding:'6px 16px',marginBottom:'20px',fontSize:'13px',color:'rgba(255,255,255,0.92)',fontWeight:'600',backdropFilter:'blur(8px)'}}>
              {s.tag}
            </div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(24px,4vw,50px)',fontWeight:'900',color:'white',lineHeight:'1.2',marginBottom:'18px',whiteSpace:'pre-line'}}>
              {s.title}
            </h1>
            <p style={{color:'rgba(255,255,255,0.77)',fontSize:'15px',lineHeight:'1.85',maxWidth:'560px',marginBottom:'26px'}}>
              {s.desc}
            </p>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'28px'}}>
              {s.badges.map(b=>(
                <span key={b} style={{display:'inline-flex',alignItems:'center',gap:'5px',background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.22)',borderRadius:'100px',padding:'5px 12px',fontSize:'12px',fontWeight:'600',color:'white'}}>
                  ✓ {b}
                </span>
              ))}
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'10px'}}>
              <button className="btn-primary" style={{fontSize:'15px',padding:'13px 26px',boxShadow:'0 6px 24px rgba(0,0,0,0.22)'}} onClick={()=>openForm(s.cta)}>
                🛒 {s.cta}
              </button>
              <button className="btn-outline-white" style={{fontSize:'14px',padding:'12px 22px'}} onClick={()=>goSection('sec-products')}>
                Xem sản phẩm →
              </button>
            </div>
          </div>
          {/* Visual */}
          <div key={'v'+key} className="slide-visual slide-visual-wrap" style={{display:'flex',justifyContent:'center'}}>
            <SlideVisual type={s.visual}/>
          </div>
        </div>

        {/* Controls */}
        <div style={{marginTop:'44px',display:'flex',alignItems:'center',gap:'12px'}}>
          <div style={{display:'flex',gap:'7px',alignItems:'center'}}>
            {SLIDES.map((_,i)=>(
              <button key={i} className="slider-dot" onClick={()=>goTo(i)}
                style={{width:i===cur?'28px':'9px',background:i===cur?'white':'rgba(255,255,255,0.35)'}}/>
            ))}
          </div>
          <span style={{fontSize:'12px',color:'rgba(255,255,255,0.45)',fontWeight:'500',marginLeft:'4px'}}>{cur+1}/{total}</span>
          <div style={{marginLeft:'auto',display:'flex',gap:'7px'}}>
            <button className="slider-arrow" onClick={()=>goTo((cur-1+total)%total)}>←</button>
            <button className="slider-arrow" onClick={()=>goTo((cur+1)%total)}>→</button>
          </div>
        </div>
      </div>
    </section>
  );
}

      <section id="sec-certs" style={{background:'linear-gradient(135deg,#1a5c34,#2d8653)',padding:'52px 24px'}}>
        <div style={{maxWidth:'1000px',margin:'0 auto',textAlign:'center'}}>
          <span style={{display:'inline-block',background:'rgba(255,255,255,0.15)',color:'white',fontSize:'11px',fontWeight:'700',letterSpacing:'1.5px',textTransform:'uppercase',padding:'6px 14px',borderRadius:'100px',marginBottom:'12px'}}>Chứng nhận quốc tế</span>
          <h2 style={{fontFamily:"'Playfair Display',serif",color:'white',fontSize:'clamp(22px,4vw,36px)',fontWeight:'700',marginBottom:'36px'}}>Tiêu chuẩn được kiểm chứng toàn cầu</h2>
          <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:'14px'}}>
            {[{cert:'ISO 22000',sub:'An toàn thực phẩm',icon:'🛡️'},{cert:'Hypoallergenic',sub:'Không kích ứng da',icon:'🌿'},{cert:'100% OBA Free',sub:'Không hóa chất tẩy',icon:'🔬'},{cert:'PEFC',sub:'Nguồn gốc bền vững',icon:'🌲'},{cert:'Halal',sub:'Chuẩn Halal quốc tế',icon:'☪️'},{cert:'SVLK',sub:'Gỗ hợp pháp',icon:'📋'}].map((c,i)=>(
              <div key={i} style={{background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'14px',padding:'18px 20px',minWidth:'130px',backdropFilter:'blur(8px)',textAlign:'center'}}>
                <div style={{fontSize:'26px',marginBottom:'8px'}}>{c.icon}</div>
                <div style={{color:'white',fontWeight:'700',fontSize:'13px'}}>{c.cert}</div>
                <div style={{color:'rgba(255,255,255,0.65)',fontSize:'11px',marginTop:'4px'}}>{c.sub}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* PROOF */}
      <section id="sec-proof" style={{background:'#f7f9f8',padding:'72px 24px'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto'}}>
          <div style={{textAlign:'center',marginBottom:'48px'}}>
            <span className="section-label">Khách hàng thực tế</span>
            <h2 className="section-title">Các Khách Sạn & Chuỗi Nhà Hàng Đã Tối Ưu Chi Phí</h2>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'22px'}}>
            {proofs.map((p,i)=>(
              <div key={i} className="proof-card">
                <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px'}}>
                  <div style={{fontSize:'34px'}}>{p.icon}</div>
                  <div>
                    <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'#2d8653',textTransform:'uppercase'}}>{p.sector}</div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:'16px',fontWeight:'700',color:'#1a2e22'}}>{p.title}</div>
                  </div>
                </div>
                <div className="green-divider" style={{width:'32px',height:'3px'}}></div>
                <p style={{fontSize:'14px',color:'#4a6557',lineHeight:'1.8'}}>{p.desc}</p>
                <div style={{marginTop:'16px',display:'flex',gap:'6px',flexWrap:'wrap'}}>
                  {['✓ Đã triển khai','✓ Tối ưu chi phí'].map((t,j)=><span key={j} className="spec-tag">{t}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* PARTNERS */}
      <section id="sec-partners" style={{padding:'72px 24px',background:'white'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto'}}>
          <div style={{textAlign:'center',marginBottom:'48px'}}>
            <span className="section-label">Đối tác tin dùng</span>
            <h2 className="section-title">Thương Hiệu Lớn Đã Lựa Chọn LIVI</h2>
            <p style={{color:'#5a7566',fontSize:'15px',maxWidth:'520px',margin:'10px auto 0'}}>Hơn 5,000 doanh nghiệp F&B, Khách sạn, Y tế và Tòa nhà đang sử dụng LIVI mỗi ngày</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:'14px'}}>
            {partners.map((p,i)=>(
              <div key={i} className="partner-logo">
                <div style={{width:'52px',height:'52px',borderRadius:'13px',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px'}}>{p.icon}</div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontWeight:'700',fontSize:'14px',color:'#1a2e22'}}>{p.name}</div>
                  <div style={{fontSize:'12px',color:'#8aaa96',marginTop:'2px'}}>{p.sector}</div>
                  <span style={{display:'inline-block',background:'#e8f5ed',color:'#2d8653',fontSize:'11px',fontWeight:'600',padding:'3px 10px',borderRadius:'100px',marginTop:'6px'}}>{p.tag}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{textAlign:'center',marginTop:'36px'}}>
            <button className="btn-primary" onClick={()=>openForm('Đăng ký trở thành Đối tác phân phối')}>🤝 Trở thành đối tác phân phối</button>
          </div>
        </div>
      </section>

      {/* POLICY */}
      <section id="sec-policy" style={{background:'#f7f9f8',padding:'72px 24px'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto'}}>
          <div style={{textAlign:'center',marginBottom:'48px'}}>
            <span className="section-label">Chính sách hợp tác</span>
            <h2 className="section-title">Chính Sách Phân Phối LIVI</h2>
            <p style={{color:'#5a7566',fontSize:'15px',maxWidth:'560px',margin:'10px auto 0'}}>3 cấp độ hợp tác linh hoạt – phù hợp từ cửa hàng nhỏ đến nhà phân phối quy mô lớn</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'22px'}}>
            {policies.map((pol,i)=>(
              <div key={i} className="policy-card" style={{background:'white'}}>
                <div style={{background:pol.headerBg,padding:'26px 22px 22px'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
                    <span style={{fontFamily:"'Playfair Display',serif",fontSize:'44px',fontWeight:'900',color:pol.isLight?'rgba(45,134,83,0.15)':'rgba(255,255,255,0.15)',lineHeight:'1'}}>{pol.tier}</span>
                    <span style={{fontSize:'34px'}}>{pol.icon}</span>
                  </div>
                  <span style={{display:'inline-block',background:pol.badgeBg,color:pol.badgeColor,fontSize:'11px',fontWeight:'700',padding:'4px 12px',borderRadius:'100px',marginBottom:'8px'}}>{pol.badge}</span>
                  <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'19px',fontWeight:'700',color:pol.isLight?'#1a2e22':'white',lineHeight:'1.25'}}>{pol.level}</h3>
                  <p style={{fontSize:'12px',fontWeight:'600',color:pol.isLight?'#5a7566':'rgba(255,255,255,0.7)',marginTop:'3px'}}>{pol.sublabel}</p>
                </div>
                <div style={{display:'flex',borderBottom:'1px solid #f0f5f2'}}>
                  {[[pol.minOrder,'Đơn tối thiểu'],[pol.discount,'Chiết khấu'],[pol.delivery,'Vận chuyển']].map(([val,lbl],j)=>(
                    <div key={j} style={{flex:1,padding:'12px 6px',textAlign:'center',borderRight:j<2?'1px solid #f0f5f2':'none'}}>
                      <div style={{fontSize:'11px',fontWeight:'700',color:'#1a5c34',lineHeight:'1.3'}}>{val}</div>
                      <div style={{fontSize:'10px',color:'#9ab8a8',marginTop:'3px'}}>{lbl}</div>
                    </div>
                  ))}
                </div>
                <div style={{padding:'18px 22px'}}>
                  <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1.2px',color:'#9ab8a8',textTransform:'uppercase',marginBottom:'10px'}}>Quyền lợi bao gồm</div>
                  <ul style={{listStyle:'none'}}>
                    {pol.perks.map((perk,j)=>(
                      <li key={j} style={{display:'flex',gap:'8px',padding:'5px 0',borderBottom:j<pol.perks.length-1?'1px dashed #f0f5f2':'none'}}>
                        <span style={{color:'#2d8653',fontWeight:'700',flexShrink:0}}>✓</span>
                        <span style={{fontSize:'13px',color:'#4a6557',lineHeight:'1.5'}}>{perk}</span>
                      </li>
                    ))}
                  </ul>
                  {i===1&&<AffiliateBar/>}
                  <button onClick={()=>openForm(pol.cta)} className="btn-primary" style={{width:'100%',justifyContent:'center',marginTop:'18px',fontSize:'14px',padding:'12px'}}>
                    {pol.cta} →
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* OFFER + INLINE FORM */}
      <section style={{padding:'72px 24px',background:'white'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto'}}>
          <div style={{textAlign:'center',marginBottom:'44px'}}>
            <span className="section-label">Ưu đãi & Hợp tác</span>
            <h2 className="section-title">Chương Trình Dành Cho Đối Tác B2B</h2>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'28px',alignItems:'start'}}>
            <div style={{background:'linear-gradient(135deg,#e8f5ed,#f0f9f3)',borderRadius:'22px',padding:'32px',border:'1.5px solid #c8e4d3',boxShadow:'0 4px 24px rgba(26,92,52,0.08)'}}>
              <span className="section-label">Ưu đãi độc quyền</span>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'21px',fontWeight:'700',color:'#1a2e22',marginBottom:'8px'}}>Đăng ký nhận mã giảm giá & Báo giá sỉ</h3>
              <p style={{fontSize:'14px',color:'#5a7566',marginBottom:'22px'}}>Dành riêng cho F&B, Khách sạn, Tòa nhà. Nhận ngay ưu đãi sỉ tốt nhất.</p>
              {!inlineDone?(
                <div style={{display:'flex',flexDirection:'column',gap:'11px'}}>
                  <input className="form-input" placeholder="Họ tên / Tên doanh nghiệp *" value={inlineForm.name} onChange={e=>setInlineForm({...inlineForm,name:e.target.value})}/>
                  <input className="form-input" placeholder="Email liên hệ *" type="email" value={inlineForm.email} onChange={e=>setInlineForm({...inlineForm,email:e.target.value})}/>
                  <input className="form-input" placeholder="Số Zalo / Điện thoại *" value={inlineForm.zalo} onChange={e=>setInlineForm({...inlineForm,zalo:e.target.value})}/>
                  <button onClick={()=>inlineValid&&setInlineDone(true)} disabled={!inlineValid} className="btn-primary"
                    style={{justifyContent:'center',marginTop:'6px',fontSize:'15px',padding:'14px',opacity:inlineValid?1:0.45,cursor:inlineValid?'pointer':'not-allowed',transform:'none'}}>
                    🎁 {inlineValid?'Nhận mã giảm giá ngay':'Vui lòng điền đầy đủ thông tin'}
                  </button>
                  <p style={{fontSize:'11px',color:'#8aaa96',textAlign:'center'}}>Không spam – chỉ dùng để tư vấn</p>
                </div>
              ):(
                <div style={{textAlign:'center',padding:'22px',background:'white',borderRadius:'14px'}}>
                  <div style={{fontSize:'44px',marginBottom:'10px'}}>🎉</div>
                  <h4 style={{fontFamily:"'Playfair Display',serif",fontSize:'19px',fontWeight:'700',color:'#1a5c34',marginBottom:'8px'}}>Đăng ký thành công!</h4>
                  <p style={{fontSize:'14px',color:'#5a7566'}}>Chúng tôi sẽ liên hệ qua Zalo trong 2 giờ làm việc.</p>
                </div>
              )}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
              {[
                {bg:'linear-gradient(135deg,#1a5c34,#2d8653)',icon:'🎁',title:'Mã giảm giá & Báo giá sỉ',desc:'Dành cho F&B, Khách sạn. Chiết khấu theo số lượng, giao hàng toàn quốc.',cta:'Lấy mã giảm giá'},
                {bg:'linear-gradient(135deg,#0f3d22,#1a5c34)',icon:'🤝',title:'Đăng ký Đại lý / Affiliate',desc:'Phân phối hàng B2B chiết khấu hấp dẫn. Hỗ trợ tư vấn và marketing.',cta:'Đăng ký Đại lý'},
                {bg:'linear-gradient(135deg,#2d8653,#4caf78)',icon:'📦',title:'Tài trợ thiết bị Dispenser',desc:'Tư vấn hệ thống Dispenser ABS cao cấp miễn phí cho dự án lớn.',cta:'Nhận tư vấn dự án'},
              ].map((card,i)=>(
                <div key={i} className="offer-card" style={{background:card.bg}}>
                  <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}}>
                    <span style={{fontSize:'28px'}}>{card.icon}</span>
                    <h4 style={{fontFamily:"'Playfair Display',serif",color:'white',fontSize:'17px',fontWeight:'700'}}>{card.title}</h4>
                  </div>
                  <p style={{color:'rgba(255,255,255,0.8)',fontSize:'13px',marginBottom:'14px',lineHeight:'1.6'}}>{card.desc}</p>
                  <button onClick={()=>openForm(card.cta)} style={{display:'inline-flex',alignItems:'center',gap:'6px',background:'rgba(255,255,255,0.2)',color:'white',border:'1px solid rgba(255,255,255,0.3)',borderRadius:'100px',padding:'8px 16px',fontSize:'13px',fontWeight:'600',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                    {card.cta} →
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* FOOTER CTA */}
      <section style={{background:'#f7f9f8',padding:'60px 24px',textAlign:'center'}}>
        <div style={{maxWidth:'680px',margin:'0 auto'}}>
          <span className="section-label">Liên hệ ngay</span>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(20px,4vw,34px)',fontWeight:'700',color:'#1a2e22',marginBottom:'10px'}}>Bạn cần tư vấn giải pháp giấy LIVI cho cơ sở kinh doanh?</h2>
          <p style={{fontSize:'15px',color:'#5a7566',marginBottom:'32px'}}>Đội ngũ chuyên gia sẵn sàng tư vấn miễn phí và gửi báo giá trong 24 giờ.</p>
          <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:'10px'}}>
            <a href={CTA.shopee} target="_blank" rel="noopener noreferrer" className="btn-primary" style={{fontSize:'14px',background:'linear-gradient(135deg,#f05a28,#d94f22)'}}>🛍️ Gian hàng LIVI (Shopee)</a>
            <a href={CTA.lazada} target="_blank" rel="noopener noreferrer" className="btn-primary" style={{fontSize:'14px',background:'linear-gradient(135deg,#f36f2c,#e55a1b)'}}>🛒 Gian hàng LIVI (Lazada)</a>
            <a href={CTA.zalo} target="_blank" rel="noopener noreferrer" className="btn-primary" style={{fontSize:'14px',background:'linear-gradient(135deg,#0da8f5,#0083c6)'}}>💬 Nhắn tin Zalo tư vấn</a>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{background:'#1a2e22',padding:'36px 24px'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto',display:'flex',flexWrap:'wrap',alignItems:'center',justifyContent:'space-between',gap:'18px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <div style={{background:'linear-gradient(135deg,#2d8653,#4caf78)',borderRadius:'10px',width:'42px',height:'42px',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:'900',fontFamily:"'Playfair Display',serif",fontSize:'19px'}}>L</div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontWeight:'700',fontSize:'19px',color:'white'}}>LIVI</div>
              <div style={{fontSize:'11px',color:'rgba(255,255,255,0.5)'}}>Premium Tissue Solutions</div>
            </div>
          </div>
          <div style={{textAlign:'center',color:'rgba(255,255,255,0.7)',fontSize:'13px',lineHeight:'1.7'}}>
            Sản xuất từ <strong style={{color:'#4caf78'}}>100% Bột giấy nguyên sinh</strong><br/>
            Phân phối chính thức bởi <strong style={{color:'#a8dbb8'}}>Grand Universal Trading Vietnam</strong>
          </div>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            <div style={{background:'rgba(76,175,120,0.2)',border:'1px solid rgba(76,175,120,0.4)',borderRadius:'8px',padding:'5px 11px',color:'#4caf78',fontSize:'12px',fontWeight:'700'}}>🌱 Go Green</div>
            <div style={{background:'rgba(76,175,120,0.2)',border:'1px solid rgba(76,175,120,0.4)',borderRadius:'8px',padding:'5px 11px',color:'#4caf78',fontSize:'12px',fontWeight:'700'}}>♻️ Zero Deforestation</div>
          </div>
        </div>
        <div style={{maxWidth:'1100px',margin:'16px auto 0',paddingTop:'16px',borderTop:'1px solid rgba(255,255,255,0.08)',display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:'8px'}}>
          <span style={{color:'rgba(255,255,255,0.35)',fontSize:'12px'}}>© 2025 LIVI – Grand Universal Trading Vietnam. All rights reserved.</span>
          <span style={{background:'rgba(76,175,120,0.15)',border:'1px solid rgba(76,175,120,0.3)',color:'#4caf78',fontSize:'11px',fontWeight:'700',padding:'4px 10px',borderRadius:'6px'}}>{VERSION}</span>
        </div>
      </footer>

      {activeProduct&&<ProductModal product={selectedProduct} onClose={()=>setActiveProduct(null)} openForm={openForm}/>}
      {formModal!==null&&<FormModal title={formModal} onClose={closeForm}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
